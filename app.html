<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ChaseTrackr"/>
<meta name="theme-color" content="#2979FF"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Exo+2:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<title>ChaseTrackr</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2979FF;--blue-h:#1A6FE8;--blue-deep:#0D3B8F;
  --cyan:#00D4FF;--gold:#F5A623;--gold2:#FFD045;
  --navy:#0A1628;--bg:#F4F8FF;--surface:#EBF3FF;
  --white:#FFFFFF;--border:#C5D9F5;
  --text:#0A1628;--text2:#3A5A8A;--muted:#7A96BB;
  --green:#00C48C;--green-bg:#E6FAF4;
  --red:#FF4D6A;--red-bg:#FFF0F3;
  --purple:#7B61FF;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:62px;--header-h:56px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

#app{display:flex;flex-direction:column;height:100%;height:100dvh}

#header{
  flex-shrink:0;height:calc(var(--header-h) + var(--safe-top));padding-top:var(--safe-top);
  background:var(--blue);display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:16px;z-index:10;position:relative;
}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-icon{height:32px;width:32px;border-radius:8px;object-fit:cover;
  -webkit-mask-image:radial-gradient(circle at center,black 55%,transparent 78%);
  mask-image:radial-gradient(circle at center,black 55%,transparent 78%)}
.hdr-wm{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.01em;font-family:'Exo 2',sans-serif}
.hdr-wm span{color:var(--cyan)}

#main{flex:1;overflow:hidden;position:relative}

.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--bg);transition:transform .26s cubic-bezier(.4,0,.2,1),opacity .26s;will-change:transform}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

#bottom-nav{
  flex-shrink:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:#fff;border-top:1px solid var(--border);display:flex;z-index:10;
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;cursor:pointer;padding:0;color:var(--muted);transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}
.nav-btn span{font-size:10px;font-weight:700;letter-spacing:.03em}

/* ── COMMON ── */
.page-header{padding:16px 16px 4px;display:flex;align-items:center;justify-content:space-between}
h2.page-title{font-size:22px;font-weight:900;color:var(--navy);font-family:'Exo 2',sans-serif}
.page-sub{font-size:13px;color:var(--muted);padding:2px 16px 12px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;
  cursor:pointer;transition:filter .15s,transform .15s;letter-spacing:.02em;font-family:'Nunito',inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(41,121,255,.28)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
.btn-ghost{background:var(--surface);color:var(--blue);border:1.5px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid rgba(255,77,106,.25)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-block{width:100%;justify-content:center}

.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  border-radius:100px;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:all .15s;
  border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip-row{display:flex;gap:6px;overflow-x:auto;padding:6px 16px 8px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}

.sec-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);padding:10px 16px 4px}

.spinner{width:28px;height:28px;border:2.5px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;gap:12px}
.loading p{font-size:13px;color:var(--muted)}

.empty{display:flex;flex-direction:column;align-items:center;padding:56px 24px;gap:10px;text-align:center}
.empty-ico{font-size:52px;opacity:.3}
.empty-t{font-size:16px;font-weight:800;color:var(--navy)}
.empty-s{font-size:13px;color:var(--muted);line-height:1.55;max-width:260px}

/* ── SEARCH ── */
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;
  border:1.5px solid var(--border);border-radius:13px;padding:11px 14px;margin:12px 16px 0;
  transition:border-color .15s;box-shadow:0 1px 4px rgba(41,121,255,.06)}
.search-bar:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(41,121,255,.12)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;color:var(--text);
  background:none;font-family:inherit}
.search-bar input::placeholder{color:var(--muted)}
.search-ico{color:var(--muted);flex-shrink:0}
.search-x{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;line-height:1;padding:2px}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px 24px}
.card-tile{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;
  cursor:pointer;transition:transform .15s,box-shadow .15s}
.card-tile:active{transform:scale(.97)}
.card-tile:hover{box-shadow:0 6px 24px rgba(41,121,255,.13);border-color:rgba(41,121,255,.3)}
.tile-art{height:140px;position:relative;overflow:hidden;background:var(--surface)}
.tile-art img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.tile-art-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px}
.tile-rarity{position:absolute;top:6px;right:6px;font-size:8px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:100px;
  background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(4px)}
.tile-chase{position:absolute;top:6px;left:6px;font-size:9px}
.tile-body{padding:10px 11px 12px}
.tile-game-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.game-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.gd-op{background:#FF4D6A}.gd-pk{background:#F5A623}.gd-other{background:var(--blue)}
.tile-setcode{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.tile-name{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:6px;line-height:1.25;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tile-price-row{display:flex;align-items:center;justify-content:space-between}
.tile-price{font-size:16px;font-weight:900;color:var(--navy);font-family:'Exo 2',sans-serif}

/* ── CARD DETAIL ── */
.detail-hero{background:linear-gradient(160deg,#0A2A8A 0%,#1A6FE8 50%,#2979FF 100%);
  padding:12px 16px 28px;position:relative;overflow:hidden}
.detail-hero::before{content:'';position:absolute;inset:0;
  background:url('Logo background.png') center/55% no-repeat;opacity:.08}
.back-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);
  border:none;border-radius:100px;padding:7px 16px;color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;margin-bottom:16px;font-family:inherit}
.detail-card-row{display:flex;gap:16px;align-items:flex-start;position:relative;z-index:1}
.detail-img-wrap{width:110px;flex-shrink:0}
.detail-img{width:110px;height:154px;object-fit:cover;object-position:top;
  border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.45);display:block}
.detail-img-fallback{width:110px;height:154px;border-radius:10px;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;font-size:52px}
.detail-info{flex:1;color:#fff;min-width:0}
.detail-name{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:4px;font-family:'Exo 2',sans-serif}
.detail-set{font-size:12px;opacity:.75;margin-bottom:10px;letter-spacing:.02em}
.detail-badges{display:flex;gap:5px;flex-wrap:wrap}
.detail-badge{font-size:9px;font-weight:800;border-radius:100px;padding:3px 9px;
  background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)}
.price-block{background:#fff;border-radius:18px;margin:0 16px;padding:20px;
  transform:translateY(-16px);box-shadow:0 8px 32px rgba(41,121,255,.14);border:1px solid var(--border)}
.pb-price{font-size:44px;font-weight:900;color:var(--navy);letter-spacing:-.03em;line-height:1;
  font-family:'Exo 2',sans-serif}
.pb-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;margin-top:3px;margin-bottom:12px}
.pb-stats{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;
  padding-top:14px;border-top:1px solid var(--border)}
.pb-stat{text-align:center}
.pb-sv{font-size:14px;font-weight:900;color:var(--navy);display:block;font-family:'Exo 2',sans-serif}
.pb-sl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.pb-div{background:var(--border)}
.chart-section{margin:0 16px 12px;background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:14px 16px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chart-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.chart-pill{font-size:10px;font-weight:700;color:var(--blue);background:var(--surface);
  border:1px solid var(--border);border-radius:100px;padding:3px 10px}
.chart-svg{width:100%;height:72px;display:block}
.detail-actions{padding:0 16px 12px}
.detail-btn{width:100%;border-radius:12px;padding:15px;font-size:14px;font-weight:700;display:flex;
  align-items:center;justify-content:center;gap:7px;cursor:pointer;border:none;
  font-family:'Nunito',inherit;transition:filter .15s,transform .15s}
.detail-btn:active{transform:scale(.97)}
.db-blue{background:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(41,121,255,.3)}
.db-blue:hover{filter:brightness(1.08)}
.db-green{background:linear-gradient(135deg,#00C48C,#00E5A0);color:#003D2A;
  box-shadow:0 2px 12px rgba(0,196,140,.3)}

/* ── PORTFOLIO HERO ── */
.port-hero{background:linear-gradient(160deg,var(--navy) 0%,#0D3B8F 50%,#1A6FE8 100%);
  padding:20px 20px 28px;color:#fff;position:relative;overflow:hidden}
.port-hero::before{content:'';position:absolute;inset:0;
  background:url('Logo background.png') center/55% no-repeat;opacity:.06}
.port-hero-z{position:relative;z-index:1}
.port-hero-label{font-size:11px;font-weight:600;opacity:.6;letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:6px}
.port-hero-value{font-size:42px;font-weight:900;letter-spacing:-.03em;line-height:1;
  font-family:'Exo 2',sans-serif}
.port-hero-gain{font-size:13px;font-weight:700;opacity:.85;margin-top:6px}
.port-refresh-btn{display:inline-flex;align-items:center;gap:6px;margin-top:16px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;
  padding:7px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:background .15s}
.port-refresh-btn:hover{background:rgba(255,255,255,.26)}
.pd-stats-bar{background:#fff;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;
  border-bottom:1px solid var(--border)}
.pds{padding:12px;text-align:center}
.pds-val{font-size:16px;font-weight:900;color:var(--navy);font-family:'Exo 2',sans-serif}
.pds-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.pds-div{background:var(--border)}
.entries-list{padding:0 16px 90px}
.entry-item{display:flex;align-items:center;gap:12px;padding:13px 0;
  border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-thumb{width:44px;height:62px;border-radius:7px;object-fit:cover;
  object-position:top;background:var(--surface);flex-shrink:0;cursor:pointer}
.entry-thumb-fallback{width:44px;height:62px;border-radius:7px;background:var(--surface);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.entry-info{flex:1;min-width:0;cursor:pointer}
.entry-name{font-size:13px;font-weight:700;color:var(--navy);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-sub{font-size:10px;color:var(--muted);margin-top:2px}
.entry-buy{font-size:10px;color:var(--text2);margin-top:3px;font-weight:600}
.entry-nums{text-align:right;flex-shrink:0}
.entry-val{font-size:14px;font-weight:900;color:var(--navy);font-family:'Exo 2',sans-serif}
.entry-chg{font-size:11px;font-weight:700;display:block;margin-top:2px}
.entry-edit{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;
  padding:6px 4px;border-radius:6px;flex-shrink:0;line-height:1}
.entry-edit:hover{background:var(--surface);color:var(--blue)}

/* ── SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(10,22,40,.52);z-index:100;
  display:flex;flex-direction:column;justify-content:flex-end;
  opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:#fff;border-radius:20px 20px 0 0;
  padding:0 0 calc(16px + var(--safe-bottom));max-height:92dvh;overflow-y:auto;
  transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:17px;font-weight:900;color:var(--navy);padding:16px 16px 12px;
  font-family:'Exo 2',sans-serif}
.sheet-body{padding:0 16px}
.fgroup{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.finput{width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:11px 14px;font-size:14px;color:var(--text);background:#fff;
  outline:none;font-family:inherit;transition:border-color .15s}
.finput:focus{border-color:var(--blue)}
.fprice-wrap{position:relative}
.fprice-sym{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-weight:700;font-size:14px;pointer-events:none}
.finput-price{padding-left:28px}
.fcard{background:var(--surface);border-radius:10px;padding:12px;margin-bottom:14px;
  display:flex;align-items:center;gap:10px}
.fcard-img{width:36px;height:50px;border-radius:5px;object-fit:cover;
  object-position:top;background:var(--border);flex-shrink:0}
.fcard-name{font-size:13px;font-weight:700;color:var(--navy)}
.fcard-sub{font-size:11px;color:var(--muted);margin-top:2px}
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left:16px;right:16px;background:var(--navy);color:#fff;border-radius:12px;
  padding:13px 16px;font-size:13px;font-weight:600;z-index:200;
  opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div id="app">

  <header id="header">
    <div class="hdr-logo">
      <img class="hdr-icon" src="Homescreen App icon.png" alt=""/>
      <span class="hdr-wm">Chase<span>Trackr</span></span>
    </div>
  </header>

  <div id="main">

    <!-- SEARCH -->
    <div class="screen active" id="s-search">
      <div class="search-bar">
        <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="q" type="search" placeholder="Search cards, sets, numbers…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="search-x" id="q-clear" style="display:none">✕</button>
      </div>
      <div class="chip-row" id="chips-game">
        <span class="chip on" data-v="">All Games</span>
        <span class="chip" data-v="onepiece" style="border-color:#FF4D6A;color:#A0002A">One Piece</span>
        <span class="chip" data-v="pokemon" style="border-color:#F5A623;color:#8B5A00">Pokémon</span>
      </div>
      <div class="chip-row" id="chips-rarity">
        <span class="chip on" data-v="">All Cards</span>
        <span class="chip" data-v="chase" style="border-color:var(--gold);color:#8B5A00">⭐ Chase</span>
        <span class="chip" data-v="Treasure Rare" style="border-color:var(--gold);color:#8B5A00">Treasure Rare</span>
        <span class="chip" data-v="Manga Rare" style="border-color:#C084FC;color:#4B35CC">Manga Rare</span>
        <span class="chip" data-v="Special Illustration Rare" style="border-color:var(--purple);color:#4B35CC">Spec. Art Rare</span>
        <span class="chip" data-v="Illustration Rare" style="border-color:var(--cyan);color:#005F7A">Illus. Rare</span>
        <span class="chip" data-v="Secret Rare" style="border-color:var(--red);color:#A0002A">Secret Rare</span>
        <span class="chip" data-v="Double Rare" style="border-color:var(--blue);color:var(--blue-deep)">Double Rare</span>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- CARD DETAIL -->
    <div class="screen hidden" id="s-detail">
      <div id="detail-inner"></div>
    </div>

    <!-- PORTFOLIO -->
    <div class="screen hidden" id="s-portfolio">
      <div id="port-inner"></div>
    </div>

  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Search</span>
    </button>
    <button class="nav-btn" data-tab="portfolio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Portfolio</span>
    </button>
  </nav>
</div>

<!-- ADD TO PORTFOLIO SHEET -->
<div class="overlay" id="sh-add">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sh-add-title">Add to Portfolio</div>
    <div class="sheet-body">
      <div class="fcard" id="sh-add-card"></div>
      <div class="fgroup">
        <label class="flabel">Quantity</label>
        <input class="finput" id="sh-add-qty" type="number" min="1" value="1"/>
      </div>
      <div class="fgroup">
        <label class="flabel">Purchase Price (per card)</label>
        <div class="fprice-wrap">
          <span class="fprice-sym">$</span>
          <input class="finput finput-price" id="sh-add-price" type="number" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div class="fgroup">
        <label class="flabel">Condition</label>
        <select class="finput" id="sh-add-cond">
          <option>Near Mint</option><option>Lightly Played</option>
          <option>Moderately Played</option><option>Heavily Played</option><option>Damaged</option>
        </select>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="sh-add-cancel">Cancel</button>
      <button class="btn btn-primary" id="sh-add-ok">Add Card</button>
    </div>
  </div>
</div>

<!-- EDIT PORTFOLIO ITEM SHEET -->
<div class="overlay" id="sh-edit">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit Entry</div>
    <div class="sheet-body">
      <div class="fcard" id="sh-edit-card"></div>
      <div class="fgroup">
        <label class="flabel">Quantity</label>

      </div>

        <label class="flabel">Purchase Price (per card)</label>
        <div class="fprice-wrap">
          <span class="fprice-sym">$</span>
          <input class="finput finput-price" id="sh-edit-price" type="number" step="0.01" placeholder="0.00"/>
        </div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-danger" id="sh-edit-del">Remove</button>
      <button class="btn btn-primary" id="sh-edit-ok">Save</button>

  </div>

<div id="toast"></div>

<script>
const BASE = 'https://chasetrackr-backend.onrender.com';
const PF_KEY = 'ct_portfolio_v1';

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async get(path) {
    const r = await fetch(BASE + path);
    if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`HTTP ${r.status}: ${t.slice(0,100)}`); }
    return r.json();
  },
  search(q, game, rarity) {
    const p = new URLSearchParams();
    if (q)      p.set('q', q);
    if (game)   p.set('game', game);
    if (rarity) p.set('rarity', rarity);
    return api.get(`/cards/search?${p}`);
  },
  card:    id      => api.get(`/cards/${id}`),
  prices:  id      => api.get(`/prices/${id}`),
  history: (id,d=30) => api.get(`/prices/${id}/history?days=${d}`),
};

// ── PORTFOLIO (localStorage) ──────────────────────────────────────────────────
const pf = {
  load() { try { return JSON.parse(localStorage.getItem(PF_KEY)||'[]'); } catch { return []; } },
  save(items) { localStorage.setItem(PF_KEY, JSON.stringify(items)); },
  add(card, cachedPrice, qty, purchasePrice, condition) {
    const items = pf.load();
    items.push({
      id: Math.random().toString(36).slice(2,10),
      card_id: card.id, name: card.name, set: card.set,
      set_code: card.set_code, number: card.number,
      rarity: card.rarity, game: card.game, image_url: card.image_url,
      quantity: qty, purchase_price: purchasePrice,
      condition: condition || 'Near Mint',
      cached_price: cachedPrice, added_at: Date.now(),
    });
    pf.save(items);
  },
  remove(id) { pf.save(pf.load().filter(i => i.id !== id)); },
  update(id, qty, purchasePrice) {
    const items = pf.load();
    const item = items.find(i => i.id === id);
    if (item) { item.quantity = qty; item.purchase_price = purchasePrice; pf.save(items); }
  },
  updatePrices(priceMap) {
    const items = pf.load().map(i => {
      const p = priceMap[i.card_id];
      return p ? { ...i, cached_price: p.market_price ?? p.current_price } : i;
    });
    pf.save(items);
    return items;
  },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  activeTab: 'search', screenStack: ['search'],
  searchGame: '', searchRarity: '', searchDebounce: null,
  activeCard: null, activeCardPrices: null, editItemId: null,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = {
  price: v => (v != null && !isNaN(+v))
    ? `$${(+v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` : '—',
  pct: v => (v != null && !isNaN(+v))
    ? `${+v>=0?'+':''}${(+v).toFixed(1)}%` : '—',
};

function gameStyle(card) {
  const g = (card.game||'').toLowerCase();
  const id = (card.id||card.card_id||'').toLowerCase();
  if (g==='onepiece'||id.startsWith('op-'))
    return { dot:'gd-op', bg:'linear-gradient(160deg,#3D0015,#8B0032,#C00040)' };
  return { dot:'gd-pk', bg:'linear-gradient(160deg,#1a1000,#5A3A00,#8B5A00)' };
}

function toast(msg, ms=2600) {
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), ms);
}
function openSheet(id)  { $(id).classList.add('open'); }
function closeSheet(id) { $(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target===o) o.classList.remove('open'); }));

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showScreen(key) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.classList.add('hidden'); });
  const el = $('s-'+key);
  el.classList.remove('hidden');
  requestAnimationFrame(() => el.classList.add('active'));
}
function push(key) { S.screenStack.push(key); showScreen(key); }
function goBack() {
  if (S.screenStack.length > 1) {
    S.screenStack.pop();
    const prev = S.screenStack[S.screenStack.length-1];
    showScreen(prev);
    if (prev==='portfolio') renderPortfolio();
  }
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.activeTab = tab; S.screenStack = [tab];
    showScreen(tab);
    if (tab==='portfolio') renderPortfolio();
  });
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
const qInput=$('q'), qClear=$('q-clear'), results=$('search-results');

qInput.addEventListener('input', () => {
  qClear.style.display = qInput.value ? 'block' : 'none';
  clearTimeout(S.searchDebounce);
  S.searchDebounce = setTimeout(doSearch, 380);
});
qClear.addEventListener('click', () => { qInput.value=''; qClear.style.display='none'; renderSearchEmpty(); });

$('chips-game').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  $('chips-game').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); S.searchGame = c.dataset.v; doSearch();
});
$('chips-rarity').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  $('chips-rarity').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); S.searchRarity = c.dataset.v; doSearch();
});

async function doSearch() {
  const q = qInput.value.trim();
  const rarity = S.searchRarity;
  if (!q && !S.searchGame && !rarity) { renderSearchEmpty(); return; }
  results.innerHTML = `<div class="loading"><div class="spinner"></div><p>Searching…</p></div>`;
  try {
    const apiRarity = rarity==='chase' ? '' : rarity;
    const data = await api.search(q, S.searchGame, apiRarity);
    let cards = Array.isArray(data) ? data : (data.results||data.cards||[]);
    if (rarity==='chase') cards = cards.filter(c => c.is_chase);
    if (!cards.length) {
      results.innerHTML = `<div class="empty"><div class="empty-ico">🃏</div>
        <div class="empty-t">No results found</div>
        <div class="empty-s">Try a different name or clear your filters.</div></div>`;
      return;
    }
    results.innerHTML = `<div class="card-grid">${cards.map(cardTileHTML).join('')}</div>`;
    results.querySelectorAll('.card-tile').forEach(el =>
      el.addEventListener('click', () => openCardDetail(el.dataset.id)));
  } catch(e) {
    results.innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div>
      <div class="empty-t">Connection error</div>
      <div class="empty-s">Could not reach the ChaseTrackr server.<br><br>
        <small style="color:var(--muted)">${e.message}</small></div></div>`;
  }
}

function renderSearchEmpty() {
  results.innerHTML = `<div class="empty" style="padding-top:48px">
    <div class="empty-ico" style="font-size:64px;opacity:.2">🔍</div>
    <div class="empty-t">Search ChaseTrackr</div>
    <div class="empty-s">Type a card name, set code, or collector number to get started.</div>
  </div>`;
}

function cardTileHTML(card) {
  const gs = gameStyle(card);
  const price = card.market_price ?? card.current_price;
  return `
    <div class="card-tile" data-id="${card.id}">
      <div class="tile-art" style="background:${gs.bg}">
        ${card.image_url
          ? `<img src="${card.image_url}" alt="${card.name}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
             <div class="tile-art-fallback" style="display:none;background:${gs.bg}">🃏</div>`
          : `<div class="tile-art-fallback" style="background:${gs.bg}">🃏</div>`}
        ${card.rarity ? `<span class="tile-rarity">${card.rarity}</span>` : ''}
        ${card.is_chase ? `<span class="tile-chase">⭐</span>` : ''}
      </div>
      <div class="tile-body">
        <div class="tile-game-row">
          <div class="game-dot ${gs.dot}"></div>
          <span class="tile-setcode">${card.set_code||''}</span>
        </div>
        <div class="tile-name">${card.name}</div>
        <div class="tile-price-row">
          <span class="tile-price">${fmt.price(price)}</span>
          ${card.is_chase ? `<span style="background:#FFF8E0;color:#8B5A00;font-size:9px;font-weight:800;border-radius:5px;padding:2px 7px">Chase</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ── CARD DETAIL ───────────────────────────────────────────────────────────────
async function openCardDetail(cardId) {
  push('detail');
  $('detail-inner').innerHTML = `<div class="loading" style="margin-top:60px"><div class="spinner"></div><p>Loading…</p></div>`;
  try {
    const [cR, pR] = await Promise.allSettled([api.card(cardId), api.prices(cardId)]);
    const card   = cR.status==='fulfilled' ? cR.value : null;
    const prices = pR.status==='fulfilled' ? pR.value : null;
    if (!card) throw new Error('Card not found');
    S.activeCard = card; S.activeCardPrices = prices;
    renderCardDetail(card, prices);
    api.history(cardId, 30).then(h => {
      const el = $('chart-area');
      if (el && h?.history?.length > 1) el.innerHTML = buildChart(h.history);
    }).catch(() => {
      const el = $('chart-area');
      if (el) el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px">No history data</div>`;
    });
  } catch(e) {
    $('detail-inner').innerHTML = `
      <div style="padding:16px"><button class="back-btn" onclick="goBack()">← Back</button></div>
      <div class="empty"><div class="empty-ico">⚠️</div>
        <div class="empty-t">Failed to load</div><div class="empty-s">${e.message}</div></div>`;
  }
}

function renderCardDetail(card, prices) {
  const gs           = gameStyle(card);
  const currentPrice = prices?.current_price ?? card.current_price;
  const marketPrice  = prices?.market_price  ?? card.market_price;
  const displayPrice = marketPrice ?? currentPrice;
  const pfItems      = pf.load().filter(i => i.card_id === card.id);
  const inPort       = pfItems.length > 0;
  const portQty      = pfItems.reduce((s,i)=>s+i.quantity, 0);

  $('detail-inner').innerHTML = `
    <div class="detail-hero">
      <button class="back-btn" id="detail-back">← Back</button>
      <div class="detail-card-row">
        <div class="detail-img-wrap">
          ${card.image_url
            ? `<img class="detail-img" src="${card.image_url}" alt="${card.name}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
               <div class="detail-img-fallback" style="display:none">🃏</div>`
            : `<div class="detail-img-fallback">🃏</div>`}
        </div>
        <div class="detail-info">
          <div class="detail-name">${card.name}</div>
          <div class="detail-set">${card.set} · #${card.number}</div>
          <div class="detail-badges">
            <span class="detail-badge">${card.rarity}</span>
            ${card.is_chase ? `<span class="detail-badge" style="background:rgba(245,166,35,.3);border-color:rgba(245,166,35,.5)">⭐ Chase</span>` : ''}
            ${card.variant && card.variant!=='standard' ? `<span class="detail-badge">${card.variant}</span>` : ''}
            ${card.type ? `<span class="detail-badge">${card.type}</span>` : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="price-block">
      <div class="pb-price">${fmt.price(displayPrice)}</div>
      <div class="pb-label">Market Price</div>
      <div class="pb-stats">
        <div class="pb-stat"><span class="pb-sv">${fmt.price(currentPrice)}</span><span class="pb-sl">Current</span></div>
        <div class="pb-div"></div>
        <div class="pb-stat"><span class="pb-sv">${fmt.price(marketPrice)}</span><span class="pb-sl">Market</span></div>
        <div class="pb-div"></div>
        <div class="pb-stat"><span class="pb-sv" style="font-size:12px">${card.set_code||'—'}</span><span class="pb-sl">Set</span></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-hdr">
        <span class="chart-title">30-Day Price History</span>
        <span class="chart-pill">30d</span>
      </div>
      <div id="chart-area" style="min-height:72px;display:flex;align-items:center;justify-content:center">
        <div class="spinner" style="width:20px;height:20px;border-width:2px"></div>
      </div>
    </div>

    <div class="detail-actions">
      <button class="detail-btn ${inPort?'db-green':'db-blue'}" id="btn-add-port">
        ${inPort ? `✓ In Portfolio (${portQty}x)` : '＋ Add to Portfolio'}
      </button>
    </div>
    <div style="height:80px"></div>`;

  $('detail-back').addEventListener('click', goBack);
  $('btn-add-port').addEventListener('click', openAddSheet);
}

function buildChart(history) {
  const prices = history.map(p=>+p.price).filter(p=>!isNaN(p));
  if (prices.length < 2) return '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">Not enough data</div>';
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const pad=(mx-mn)*.12||1, lo=mn-pad, range=mx+pad-lo;
  const W=320,H=72;
  const pts=prices.map((p,i)=>`${(i/(prices.length-1))*W},${H-((p-lo)/range)*H}`).join(' ');
  const trend=prices[prices.length-1]>=prices[0]?'#00C48C':'#FF4D6A';
  const lx=(prices.length-1)/(prices.length-1)*W;
  const ly=H-((prices[prices.length-1]-lo)/range)*H;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${trend}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${trend}" stop-opacity="0"/>
    </linearGradient></defs>
    <polyline points="${pts} ${W},${H} 0,${H}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="${trend}" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="4" fill="${trend}"/>
  </svg>`;
}

// ── PORTFOLIO ─────────────────────────────────────────────────────────────────
function renderPortfolio(liveMap=null) {
  const el=$('port-inner'), items=pf.load();

  if (!items.length) {
    el.innerHTML = `<div class="page-header"><h2 class="page-title">Portfolio</h2></div>
      <div class="empty" style="padding-top:40px">
        <div class="empty-ico" style="font-size:64px;opacity:.2">👜</div>
        <div class="empty-t">Portfolio is empty</div>
        <div class="empty-s">Search for a card and tap "Add to Portfolio" to start tracking your collection.</div>
      </div>`;
    return;
  }

  const priceOf = id => liveMap?.[id]?.market_price ?? liveMap?.[id]?.current_price
    ?? items.find(i=>i.card_id===id)?.cached_price ?? null;

  let totalValue=0, totalCost=0, hasCost=false;
  items.forEach(it => {
    const cp=priceOf(it.card_id);
    if (cp!=null) totalValue += cp*it.quantity;
    if (it.purchase_price!=null) { totalCost += it.purchase_price*it.quantity; hasCost=true; }
  });
  const gain    = hasCost ? totalValue-totalCost : null;
  const gainPct = hasCost && totalCost>0 ? (gain/totalCost)*100 : null;
  const gainPos = gain==null||gain>=0;
  const uniq    = new Set(items.map(i=>i.card_id)).size;
  const totalQty= items.reduce((s,i)=>s+i.quantity,0);

  el.innerHTML = `
    <div class="port-hero">
      <div class="port-hero-z">
        <div class="port-hero-label">Total Portfolio Value</div>
        <div class="port-hero-value">${totalValue>0?fmt.price(totalValue):'—'}</div>
        ${gain!=null
          ? `<div class="port-hero-gain" style="color:${gainPos?'#7EFFD0':'#FFB0B0'}">
               ${gainPos?'↑':'↓'} ${fmt.price(Math.abs(gain))} (${fmt.pct(gainPct)}) vs cost basis
             </div>`
          : `<div class="port-hero-gain" style="opacity:.5">Add purchase prices to track gains</div>`}
        <button class="port-refresh-btn" id="btn-refresh">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Refresh Prices
        </button>
      </div>
    </div>

    <div class="pd-stats-bar">
      <div class="pds"><div class="pds-val">${uniq}</div><div class="pds-lbl">Cards</div></div>
      <div class="pds-div"></div>
      <div class="pds"><div class="pds-val">${totalQty}</div><div class="pds-lbl">Total Qty</div></div>
      <div class="pds-div"></div>
      <div class="pds"><div class="pds-val">${hasCost?fmt.price(totalCost):'—'}</div><div class="pds-lbl">Cost Basis</div></div>
    </div>

    <div class="sec-label">Your Cards</div>
    <div class="entries-list">
      ${items.map(it => {
        const cp     = priceOf(it.card_id);
        const value  = cp!=null ? cp*it.quantity : null;
        const cost   = it.purchase_price!=null ? it.purchase_price*it.quantity : null;
        const itGain = (value!=null&&cost!=null) ? value-cost : null;
        const itPct  = (itGain!=null&&cost>0) ? (itGain/cost)*100 : null;
        const pos    = itGain==null||itGain>=0;
        return `<div class="entry-item">
          ${it.image_url
            ? `<img class="entry-thumb" src="${it.image_url}" alt="${it.name}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
                 onclick="openCardDetail('${it.card_id}')"/>
               <div class="entry-thumb-fallback" style="display:none" onclick="openCardDetail('${it.card_id}')">🃏</div>`
            : `<div class="entry-thumb-fallback" onclick="openCardDetail('${it.card_id}')">🃏</div>`}
          <div class="entry-info" onclick="openCardDetail('${it.card_id}')">
            <div class="entry-name">${it.name}</div>
            <div class="entry-sub">${it.set} · ${it.rarity} · ${it.quantity}x</div>
            ${it.purchase_price!=null
              ? `<div class="entry-buy">Bought @ ${fmt.price(it.purchase_price)}/ea</div>`
              : `<div class="entry-buy" style="opacity:.45">No purchase price set</div>`}
          </div>
          <div class="entry-nums">
            <div class="entry-val">${value!=null?fmt.price(value):'—'}</div>
            ${itGain!=null
              ? `<span class="entry-chg" style="color:${pos?'var(--green)':'var(--red)'}">
                   ${pos?'↑':'↓'} ${fmt.pct(itPct)}
                 </span>`
              : (cp!=null?`<span class="entry-chg" style="color:var(--muted)">${fmt.price(cp)} mkt</span>`:'')
            }
          </div>
          <button class="entry-edit" onclick="openEditSheet('${it.id}')">✎</button>
        </div>`;
      }).join('')}
    </div>`;

  $('btn-refresh').addEventListener('click', refreshPrices);
}

async function refreshPrices() {
  const btn = $('btn-refresh');
  if (btn) { btn.disabled=true; btn.innerHTML='↻ Updating…'; }
  const items   = pf.load();
  const ids     = [...new Set(items.map(i=>i.card_id))];
  const settled = await Promise.allSettled(ids.map(id=>api.prices(id)));
  const liveMap = {};
  settled.forEach((r,i) => { if (r.status==='fulfilled') liveMap[ids[i]]=r.value; });
  pf.updatePrices(liveMap);
  renderPortfolio(liveMap);
  toast('Prices refreshed ✓');
}

// ── ADD TO PORTFOLIO SHEET ────────────────────────────────────────────────────
function openAddSheet() {
  const card = S.activeCard; if (!card) return;
  const existing = pf.load().find(i=>i.card_id===card.id);

  $('sh-add-card').innerHTML = `
    ${card.image_url
      ? `<img class="fcard-img" src="${card.image_url}" alt="${card.name}" loading="lazy"/>`
      : `<div class="fcard-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface)">🃏</div>`}
    <div><div class="fcard-name">${card.name}</div><div class="fcard-sub">${card.set} · ${card.rarity}</div></div>`;

  $('sh-add-qty').value    = existing?.quantity ?? 1;
  $('sh-add-price').value  = existing?.purchase_price ?? '';
  $('sh-add-title').textContent = existing ? 'Update Portfolio Entry' : 'Add to Portfolio';
  $('sh-add-ok').textContent    = existing ? 'Update' : 'Add Card';
  $('sh-add').dataset.existingId = existing?.id ?? '';
  openSheet('sh-add');
}

$('sh-add-cancel').addEventListener('click', ()=>closeSheet('sh-add'));
$('sh-add-ok').addEventListener('click', ()=>{
  const card = S.activeCard; if (!card) return;
  const qty        = Math.max(1, parseInt($('sh-add-qty').value)||1);
  const price      = parseFloat($('sh-add-price').value)||null;
  const cond       = $('sh-add-cond').value;
  const existingId = $('sh-add').dataset.existingId;
  const cachedPrice = S.activeCardPrices?.market_price ?? S.activeCardPrices?.current_price
    ?? card.market_price ?? card.current_price;

  if (existingId) {
    pf.update(existingId, qty, price);
    toast(`${card.name} updated ✓`);
  } else {
    pf.add(card, cachedPrice, qty, price, cond);
    toast(`${card.name} added to portfolio ✓`);
  }
  closeSheet('sh-add');

  const btn = $('btn-add-port');
  if (btn) {
    const items = pf.load().filter(i=>i.card_id===card.id);
    const q2 = items.reduce((s,i)=>s+i.quantity,0);
    btn.textContent = `✓ In Portfolio (${q2}x)`;
    btn.className = 'detail-btn db-green';
  }
});

// ── EDIT SHEET ────────────────────────────────────────────────────────────────
function openEditSheet(itemId) {
  const item = pf.load().find(i=>i.id===itemId); if (!item) return;
  S.editItemId = itemId;
  $('sh-edit-card').innerHTML = `
    ${item.image_url
      ? `<img class="fcard-img" src="${item.image_url}" alt="${item.name}" loading="lazy"/>`
      : `<div class="fcard-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface)">🃏</div>`}
    <div><div class="fcard-name">${item.name}</div><div class="fcard-sub">${item.set} · ${item.rarity}</div></div>`;
  $('sh-edit-qty').value   = item.quantity;
  $('sh-edit-price').value = item.purchase_price ?? '';
  openSheet('sh-edit');
}

$('sh-edit-del').addEventListener('click', ()=>{
  if (!S.editItemId) return;
  const name = pf.load().find(i=>i.id===S.editItemId)?.name ?? 'Card';
  pf.remove(S.editItemId);
  closeSheet('sh-edit');
  toast(`${name} removed`);
  renderPortfolio();
});

$('sh-edit-ok').addEventListener('click', ()=>{
  if (!S.editItemId) return;
  const qty   = Math.max(1, parseInt($('sh-edit-qty').value)||1);
  const price = parseFloat($('sh-edit-price').value)||null;
  pf.update(S.editItemId, qty, price);
  closeSheet('sh-edit');
  toast('Entry updated ✓');
  renderPortfolio();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSearchEmpty();
</script>
</body>
</html>
